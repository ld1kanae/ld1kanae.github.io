<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<title>The Blinds</title>

<!-- Favicon -->
<link rel="icon" type="image/png" href="cover-front.png">
<link rel="apple-touch-icon" href="cover-front.png">

<!-- OGP — SNS共有時のサムネイル -->
<meta property="og:title" content="The Blinds">
<meta property="og:image" content="https://ld1kanae.github.io/theblinds/cover-front.png">
<meta property="og:type" content="website">
<meta property="og:url" content="https://ld1kanae.github.io/theblinds/">
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:image" content="https://ld1kanae.github.io/theblinds/cover-front.png">

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{
    width:100%;height:100%;overflow:hidden;
    touch-action:pan-y;
    -webkit-tap-highlight-color:transparent;
    user-select:none;-webkit-user-select:none;
  }
  body{
    display:flex;align-items:center;justify-content:center;
    font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Hiragino Kaku Gothic ProN",Meiryo,sans-serif;
    transition:background-color 0.5s ease;
  }

  /* --- Loading --- */
  #loading-overlay{
    position:fixed;inset:0;display:flex;flex-direction:column;
    align-items:center;justify-content:center;z-index:1000;
    transition:opacity 0.8s ease;
  }
  #loading-overlay.hidden{opacity:0;pointer-events:none}
  .loader{
    width:28px;height:28px;
    border:1.5px solid rgba(128,128,128,0.15);
    border-top-color:rgba(128,128,128,0.6);
    border-radius:50%;animation:spin 0.7s linear infinite;
  }
  @keyframes spin{to{transform:rotate(360deg)}}
  .loading-text{margin-top:14px;font-size:11px;letter-spacing:0.08em;opacity:0.4}

  /* --- Error --- */
  #error-screen{
    position:fixed;inset:0;display:none;flex-direction:column;
    align-items:center;justify-content:center;z-index:999;padding:32px;text-align:center;
  }
  #error-screen.show{display:flex}
  #error-screen h2{font-size:16px;margin-bottom:10px;opacity:0.7;font-weight:500}
  #error-screen p{font-size:12px;opacity:0.4;max-width:420px;line-height:1.8;white-space:pre-line}

  /* --- Viewer --- */
  #viewer{
    display:flex;align-items:center;justify-content:center;
    width:100%;height:100%;position:relative;
    opacity:0;transition:opacity 0.8s ease 0.1s;
  }
  #viewer.visible{opacity:1}

  /* --- Spread Container --- */
  #spread-container{
    display:flex;align-items:center;justify-content:center;
    gap:0;max-width:100%;max-height:100%;position:relative;
  }

  /* --- Page Canvas --- */
  .page-canvas{display:block;max-height:100vh;object-fit:contain}
  .page-entering{animation:pageEnter 0.2s ease-out}
  @keyframes pageEnter{0%{opacity:0.3}100%{opacity:1}}

  /* --- Center Spine Shadow (for spread mode) --- */
  .spine-shadow{
    position:absolute;top:0;bottom:0;
    width:24px;left:50%;transform:translateX(-50%);
    pointer-events:none;z-index:5;
    background:linear-gradient(to right,
      transparent 0%,
      rgba(0,0,0,0.06) 30%,
      rgba(0,0,0,0.12) 48%,
      rgba(0,0,0,0.12) 52%,
      rgba(0,0,0,0.06) 70%,
      transparent 100%
    );
  }

  /* --- Navigation Zones --- */
  .nav-zone{position:absolute;top:0;height:100%;cursor:pointer;z-index:10}
  .nav-zone-left{left:0;width:35%}
  .nav-zone-right{right:0;width:35%}
  .nav-zone-center{left:35%;width:30%;height:100%;position:absolute;top:0;cursor:default;z-index:10}

  /* --- Page Indicator --- */
  #page-indicator{
    position:fixed;bottom:max(16px, env(safe-area-inset-bottom, 16px));
    left:50%;transform:translateX(-50%);
    font-size:10px;letter-spacing:0.12em;
    opacity:0;transition:opacity 0.4s ease;
    pointer-events:none;z-index:50;
    padding:5px 14px;border-radius:20px;
    font-variant-numeric:tabular-nums;
  }
  #page-indicator.show{opacity:0.55}

  /* --- Progress Bar --- */
  #progress-bar{
    position:fixed;bottom:0;left:0;height:1.5px;
    transition:width 0.35s ease;z-index:50;opacity:0.25;
  }

  /* --- Navigation Hint Arrow --- */
  #nav-hint{
    position:fixed;
    bottom:max(54px, calc(env(safe-area-inset-bottom, 12px) + 42px));
    left:50%;transform:translateX(-50%);
    pointer-events:none;z-index:40;
    opacity:0;
    transition:opacity 1.2s ease;
  }
  #nav-hint.show{opacity:1}
  #nav-hint svg{
    width:36px;height:36px;
    stroke-width:2;
    stroke-linecap:round;
    stroke-linejoin:round;
    fill:none;
  }

  /* --- Settings --- */
  #settings-btn{
    position:fixed;top:max(10px, env(safe-area-inset-top, 10px));right:10px;
    width:32px;height:32px;border:none;border-radius:50%;
    background:rgba(128,128,128,0.1);color:inherit;
    font-size:14px;cursor:pointer;z-index:100;opacity:0;
    transition:opacity 0.3s ease;
    display:flex;align-items:center;justify-content:center;
  }
  #settings-btn:hover,#settings-btn.visible{opacity:0.6}

  #settings-panel{
    position:fixed;top:52px;right:10px;
    padding:16px 18px;border-radius:10px;
    z-index:100;display:none;min-width:200px;font-size:12px;
    box-shadow:0 6px 24px rgba(0,0,0,0.15);
    backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
  }
  #settings-panel.show{display:block}

  .setting-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
  .setting-row:last-child{margin-bottom:0}
  .setting-label{opacity:0.6;font-size:11px}
  .setting-toggle{display:flex;gap:0;border-radius:5px;overflow:hidden;border:1px solid rgba(128,128,128,0.25)}
  .setting-toggle button{
    padding:3px 9px;border:none;background:transparent;
    color:inherit;font-size:10px;cursor:pointer;opacity:0.35;transition:all 0.2s;
  }
  .setting-toggle button.active{opacity:0.9;background:rgba(128,128,128,0.18)}
</style>
</head>
<body>

<div id="loading-overlay">
  <div class="loader"></div>
  <div class="loading-text">読み込み中…</div>
</div>

<div id="error-screen">
  <h2>読み込みに失敗しました</h2>
  <p id="error-message"></p>
</div>

<div id="viewer">
  <div id="spread-container"></div>
  <div class="nav-zone nav-zone-left" id="nav-left"></div>
  <div class="nav-zone nav-zone-center" id="nav-center"></div>
  <div class="nav-zone nav-zone-right" id="nav-right"></div>
</div>

<div id="page-indicator"></div>
<div id="progress-bar"></div>

<!-- Navigation Hint Arrow -->
<div id="nav-hint">
  <svg viewBox="0 0 28 28" xmlns="http://www.w3.org/2000/svg">
    <polyline id="nav-hint-arrow" points="10,6 18,14 10,22"/>
  </svg>
</div>

<button id="settings-btn">⚙</button>
<div id="settings-panel">
  <div class="setting-row">
    <span class="setting-label">背景</span>
    <div class="setting-toggle" id="bg-toggle">
      <button data-value="black" class="active">黒</button>
      <button data-value="white">白</button>
    </div>
  </div>
  <div class="setting-row">
    <span class="setting-label">開き</span>
    <div class="setting-toggle" id="dir-toggle">
      <button data-value="rtl">右開き</button>
      <button data-value="ltr" class="active">左開き</button>
    </div>
  </div>
</div>

<script>
/* ================================================================
   ★ 設定 — 作品ごとに以下を編集してください
   ================================================================ */
const CONFIG = {
  // 本文PDFファイルのパス
  pdfPath: 'book.pdf',

  // 表紙・裏表紙の画像パス（PNG/JPG）不要なら '' に
  frontCover: 'cover-front.png',
  backCover:  'cover-back.png',

  // 背景色: 'black' / 'white'
  backgroundColor: 'black',

  // 開き方向: 'rtl'（右開き＝縦書き） / 'ltr'（左開き＝横書き）
  readingDirection: 'ltr',

  // 描画品質倍率（1.0〜2.0）
  quality: 1.5,

  // 黒補正: この値以下のRGBを純黒に（0 = 無効）
  blackCorrection: 40,

  // ── ノド補正（単ページ表示時のみ適用） ──
  // true で有効化。ノド余白を小口に揃えてトリミングする
  gutterCorrection: true,
  gutterMargin: 16.75,   // PDF上のノド（綴じ側）余白 mm
  foreEdgeMargin: 12,     // PDF上の小口（外側）余白 mm
};
/* ================================================================ */

pdfjsLib.GlobalWorkerOptions.workerSrc =
  'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

// ── Constants ──
const MM_TO_PT = 72 / 25.4; // 1mm ≈ 2.8346 PDF points
const BOOKMARK_KEY = 'bookviewer_pos_' + CONFIG.pdfPath;

// ── Bookmark (reading position persistence) ──
function saveBookmark() {
  try {
    const vIdx = spreads[currentIdx] ? spreads[currentIdx][0] : 0;
    localStorage.setItem(BOOKMARK_KEY, '' + vIdx);
  } catch(e) {}
}
function restoreBookmark() {
  try {
    const saved = localStorage.getItem(BOOKMARK_KEY);
    if (saved === null) return;
    const vIdx = parseInt(saved, 10);
    if (isNaN(vIdx) || vIdx <= 0) return;
    const idx = spreads.findIndex(s => s.includes(vIdx));
    if (idx > 0) currentIdx = idx;
  } catch(e) {}
}

// ── State ──
let pdfDoc = null;
let virtualPages = []; // [{type:'cover',img},{type:'pdf',num}]
let totalVirtual = 0;
let spreads = [], currentIdx = 0;
let isSpread = false;
let pageCache = new Map();
let bgColor = CONFIG.backgroundColor;
let readDir = CONFIG.readingDirection;
let indicatorTimer = null, settingsOpen = false, navigating = false;
let hintTimer = null, hintVisible = false;

// ── DOM ──
const $ = id => document.getElementById(id);
const $loading = $('loading-overlay'), $error = $('error-screen'), $errMsg = $('error-message');
const $viewer = $('viewer'), $spread = $('spread-container');
const $indicator = $('page-indicator'), $progress = $('progress-bar');
const $navL = $('nav-left'), $navR = $('nav-right'), $navC = $('nav-center');
const $setBtn = $('settings-btn'), $setPanel = $('settings-panel');
const $hint = $('nav-hint'), $hintArrow = $('nav-hint-arrow');

// ── Theme ──
function applyTheme() {
  const dk = bgColor === 'black';
  document.body.style.backgroundColor = dk ? '#080808' : '#f4f3ee';
  document.body.style.color = dk ? '#aaa' : '#444';
  $loading.style.backgroundColor = dk ? '#080808' : '#f4f3ee';
  $progress.style.backgroundColor = dk ? 'rgba(255,255,255,0.12)' : 'rgba(0,0,0,0.1)';
  $indicator.style.backgroundColor = dk ? 'rgba(255,255,255,0.06)' : 'rgba(0,0,0,0.05)';
  $indicator.style.color = dk ? '#666' : '#888';
  $setPanel.style.backgroundColor = dk ? 'rgba(20,20,20,0.95)' : 'rgba(255,255,255,0.95)';
  $setPanel.style.color = dk ? '#bbb' : '#444';
  $setPanel.style.border = `1px solid ${dk ? 'rgba(255,255,255,0.06)' : 'rgba(0,0,0,0.06)'}`;
  $hintArrow.style.stroke = 'rgb(128,128,128)';
}

// ── Navigation Hint ──
function updateHintPosition() {
  if (readDir === 'ltr') {
    $hintArrow.setAttribute('points', '10,6 18,14 10,22'); // →
  } else {
    $hintArrow.setAttribute('points', '18,6 10,14 18,22'); // ←
  }
}

function resetHintTimer() {
  if (hintVisible) { $hint.classList.remove('show'); hintVisible = false; }
  clearTimeout(hintTimer);
  // Show quickly on cover, slower on other pages
  const delay = (currentIdx === 0) ? 1000 : 4000;
  hintTimer = setTimeout(() => {
    if (currentIdx < spreads.length - 1) {
      $hint.classList.add('show'); hintVisible = true;
      setTimeout(() => { $hint.classList.remove('show'); hintVisible = false; }, 3500);
    }
  }, delay);
}

// ── Layout Detection ──
function detectSpread() {
  return window.innerWidth > window.innerHeight && window.innerWidth >= 600;
}

// ── Load Cover Image ──
function loadImage(src) {
  return new Promise((resolve, reject) => {
    if (!src) { reject('no src'); return; }
    const img = new Image();
    img.onload = () => resolve(img);
    img.onerror = () => reject('Failed: ' + src);
    img.src = src;
  });
}

// ── Build Virtual Page List ──
function buildVirtualPages(frontImg, backImg) {
  virtualPages = [];
  if (frontImg) virtualPages.push({ type: 'cover', img: frontImg, label: '表紙' });
  for (let i = 1; i <= pdfDoc.numPages; i++) virtualPages.push({ type: 'pdf', num: i });
  if (backImg) virtualPages.push({ type: 'cover', img: backImg, label: '裏表紙' });
  totalVirtual = virtualPages.length;
}

// ── Build Spreads (0-based virtual indices) ──
function buildSpreads() {
  spreads = [];
  if (!totalVirtual) return;

  if (!isSpread) {
    for (let i = 0; i < totalVirtual; i++) spreads.push([i]);
    return;
  }

  // Identify pages that must remain single:
  // all covers + first PDF page + last PDF page
  const mustSingle = new Set();
  let pdfFirst = -1, pdfLast = -1;
  virtualPages.forEach((v, i) => {
    if (v.type === 'cover') mustSingle.add(i);
    if (v.type === 'pdf') {
      if (pdfFirst < 0) pdfFirst = i;
      pdfLast = i;
    }
  });
  if (pdfFirst >= 0) mustSingle.add(pdfFirst);
  if (pdfLast >= 0) mustSingle.add(pdfLast);

  let i = 0;
  while (i < totalVirtual) {
    if (mustSingle.has(i)) {
      spreads.push([i]);
      i++;
    } else if (i + 1 < totalVirtual && !mustSingle.has(i + 1)) {
      spreads.push([i, i + 1]);
      i += 2;
    } else {
      // next page is single — this one goes solo too
      spreads.push([i]);
      i++;
    }
  }
}

// ── Gutter Side ──
// LTR: odd PDF pages (recto, right-hand) → gutter on LEFT; even (verso) → gutter on RIGHT
function gutterSide(pdfPageNum) {
  if (readDir === 'ltr') return (pdfPageNum % 2 === 1) ? 'left' : 'right';
  else return (pdfPageNum % 2 === 1) ? 'right' : 'left';
}

// ── Render Cover ──
function renderCover(img, maxW, maxH) {
  const scale = Math.min(maxW / img.naturalWidth, maxH / img.naturalHeight);
  const dw = img.naturalWidth * scale, dh = img.naturalHeight * scale;
  const pxr = window.devicePixelRatio || 1;
  const c = document.createElement('canvas');
  c.width = dw * pxr; c.height = dh * pxr;
  c.style.width = dw + 'px'; c.style.height = dh + 'px';
  c.className = 'page-canvas';
  c.getContext('2d').drawImage(img, 0, 0, c.width, c.height);
  return c;
}

// ── Render PDF Page ──
async function renderPdfPage(num, maxW, maxH) {
  const page = await pdfDoc.getPage(num);
  const vp = page.getViewport({ scale: 1 });
  const fit = Math.min(maxW / vp.width, maxH / vp.height);
  const pxr = window.devicePixelRatio || 1;
  const rScale = fit * CONFIG.quality * pxr;
  const svp = page.getViewport({ scale: rScale });
  const dvp = page.getViewport({ scale: fit });

  const c = document.createElement('canvas');
  c.width = svp.width; c.height = svp.height;
  c.style.width = dvp.width + 'px'; c.style.height = dvp.height + 'px';
  c.className = 'page-canvas';

  const ctx = c.getContext('2d');
  await page.render({ canvasContext: ctx, viewport: svp }).promise;

  // Black correction
  if (CONFIG.blackCorrection > 0) {
    const imgData = ctx.getImageData(0, 0, c.width, c.height);
    const d = imgData.data, t = CONFIG.blackCorrection;
    for (let i = 0, len = d.length; i < len; i += 4) {
      if (d[i] <= t && d[i+1] <= t && d[i+2] <= t) d[i] = d[i+1] = d[i+2] = 0;
    }
    ctx.putImageData(imgData, 0, 0);
  }

  // Gutter trim (always applied when enabled)
  if (CONFIG.gutterCorrection) {
    const cropMm = CONFIG.gutterMargin - CONFIG.foreEdgeMargin;
    if (cropMm > 0) {
      const cropPx = Math.round(cropMm * MM_TO_PT * rScale);
      const side = gutterSide(num);
      const trimmed = document.createElement('canvas');
      const nw = c.width - cropPx;
      trimmed.width = nw; trimmed.height = c.height;
      const sx = (side === 'left') ? cropPx : 0;
      trimmed.getContext('2d').drawImage(c, sx, 0, nw, c.height, 0, 0, nw, c.height);
      const displayCrop = Math.round(cropMm * MM_TO_PT * fit);
      trimmed.style.width = (dvp.width - displayCrop) + 'px';
      trimmed.style.height = dvp.height + 'px';
      trimmed.className = 'page-canvas';
      return trimmed;
    }
  }
  return c;
}

// ── Unified Render ──
async function renderVPage(vIdx, maxW, maxH) {
  const key = `${vIdx}:${Math.round(maxW)}:${Math.round(maxH)}:${readDir}`;
  if (pageCache.has(key)) return pageCache.get(key);
  const vp = virtualPages[vIdx];
  const canvas = vp.type === 'cover'
    ? renderCover(vp.img, maxW, maxH)
    : await renderPdfPage(vp.num, maxW, maxH);
  pageCache.set(key, canvas);
  return canvas;
}

function cloneCanvas(src) {
  const c = document.createElement('canvas');
  c.width = src.width; c.height = src.height;
  c.style.width = src.style.width; c.style.height = src.style.height;
  c.className = 'page-canvas page-entering';
  c.getContext('2d').drawImage(src, 0, 0);
  return c;
}

// ── Display ──
async function display() {
  if (!spreads.length) return;
  const sp = spreads[currentIdx];
  const vw = window.innerWidth, vh = window.innerHeight;

  let mw, mh = vh;
  if (sp.length === 2) mw = (vw / 2) - 1;
  else mw = isSpread ? Math.min(vw * 0.48, vh * 0.75) : vw;

  const nodes = [];
  for (const vi of sp) {
    const src = await renderVPage(vi, mw, mh);
    nodes.push(cloneCanvas(src));
  }

  $spread.innerHTML = '';
  if (sp.length === 2) {
    if (readDir === 'rtl') { $spread.appendChild(nodes[1]); $spread.appendChild(nodes[0]); }
    else { $spread.appendChild(nodes[0]); $spread.appendChild(nodes[1]); }
    const spine = document.createElement('div');
    spine.className = 'spine-shadow';
    $spread.appendChild(spine);
  } else {
    $spread.appendChild(nodes[0]);
  }

  updateIndicator(sp);
  $progress.style.width = ((currentIdx + 1) / spreads.length * 100) + '%';
  saveBookmark();
  resetHintTimer();
  preload();
}

function updateIndicator(sp) {
  const labels = sp.map(i => {
    const v = virtualPages[i];
    return v.type === 'cover' ? v.label : '' + v.num;
  });
  let txt;
  if (sp.length === 2) {
    txt = readDir === 'rtl'
      ? `${labels[1]}–${labels[0]} / ${totalVirtual}`
      : `${labels[0]}–${labels[1]} / ${totalVirtual}`;
  } else {
    txt = `${labels[0]} / ${totalVirtual}`;
  }
  $indicator.textContent = txt;
  $indicator.classList.add('show');
  clearTimeout(indicatorTimer);
  indicatorTimer = setTimeout(() => $indicator.classList.remove('show'), 2200);
}

async function preload() {
  const vw = window.innerWidth, vh = window.innerHeight;
  for (const di of [-1, 1]) {
    const idx = currentIdx + di;
    if (idx < 0 || idx >= spreads.length) continue;
    const sp = spreads[idx];
    const mw = sp.length === 2 ? (vw/2)-1 : (isSpread ? Math.min(vw*0.48, vh*0.75) : vw);
    for (const vi of sp) renderVPage(vi, mw, vh).catch(() => {});
  }
}

// ── Navigation ──
function next() {
  if (navigating || currentIdx >= spreads.length - 1) return;
  navigating = true; currentIdx++;
  display().then(() => navigating = false);
}
function prev() {
  if (navigating || currentIdx <= 0) return;
  navigating = true; currentIdx--;
  display().then(() => navigating = false);
}
function forward() { next(); }
function backward() { prev(); }

$navL.addEventListener('click', e => { e.preventDefault(); readDir === 'rtl' ? forward() : backward(); });
$navR.addEventListener('click', e => { e.preventDefault(); readDir === 'rtl' ? backward() : forward(); });
$navC.addEventListener('click', e => { e.preventDefault(); updateIndicator(spreads[currentIdx]); });

document.addEventListener('keydown', e => {
  const k = e.key;
  if (k==='ArrowLeft') { e.preventDefault(); readDir==='rtl' ? forward() : backward(); }
  else if (k==='ArrowRight') { e.preventDefault(); readDir==='rtl' ? backward() : forward(); }
  else if (k==='ArrowDown'||k==='PageDown'||k===' ') { e.preventDefault(); forward(); }
  else if (k==='ArrowUp'||k==='PageUp') { e.preventDefault(); backward(); }
  else if (k==='Home') { e.preventDefault(); currentIdx=0; display(); }
  else if (k==='End') { e.preventDefault(); currentIdx=spreads.length-1; display(); }
});

let tx0=0,ty0=0,tt0=0;
document.addEventListener('touchstart', e => {
  tx0=e.touches[0].clientX; ty0=e.touches[0].clientY; tt0=Date.now();
}, {passive:true});
document.addEventListener('touchend', e => {
  const dx=e.changedTouches[0].clientX-tx0, dy=e.changedTouches[0].clientY-ty0;
  if (Date.now()-tt0>400||Math.abs(dx)<45||Math.abs(dy)>Math.abs(dx)*0.6) return;
  dx<0 ? forward() : backward();
}, {passive:true});

let lastTE=0;
document.addEventListener('touchend', e => {
  const now=Date.now(); if (now-lastTE<=300) e.preventDefault(); lastTE=now;
}, false);

// ── Resize ──
let resizeT=null;
let pendingFullscreen = false;

function requestFs() {
  const el = document.documentElement;
  const rq = el.requestFullscreen || el.webkitRequestFullscreen || el.msRequestFullscreen;
  if (rq) rq.call(el).catch(() => {});
}
function exitFs() {
  const ex = document.exitFullscreen || document.webkitExitFullscreen || document.msExitFullscreen;
  if (ex && (document.fullscreenElement || document.webkitFullscreenElement)) {
    ex.call(document).catch(() => {});
  }
}
function isFullscreen() {
  return !!(document.fullscreenElement || document.webkitFullscreenElement);
}

function onResize() {
  clearTimeout(resizeT);
  resizeT = setTimeout(() => {
    const was = isSpread;
    isSpread = detectSpread();
    pageCache.clear();

    // Request fullscreen when entering landscape (needs user gesture)
    if (isSpread && !was && !isFullscreen()) {
      pendingFullscreen = true;
    }
    // Exit fullscreen when returning to portrait
    if (!isSpread && was && isFullscreen()) {
      exitFs();
    }

    if (was !== isSpread) {
      const fv = spreads[currentIdx] ? spreads[currentIdx][0] : 0;
      buildSpreads();
      currentIdx = spreads.findIndex(s => s.includes(fv));
      if (currentIdx < 0) currentIdx = 0;
    }
    display();
  }, 180);
}

// Fulfill pending fullscreen on next user gesture
document.addEventListener('click', () => {
  if (pendingFullscreen) { pendingFullscreen = false; requestFs(); }
}, { capture: true });
document.addEventListener('touchend', () => {
  if (pendingFullscreen) { pendingFullscreen = false; requestFs(); }
}, { capture: true, passive: true });

window.addEventListener('resize', onResize);
window.addEventListener('orientationchange', () => setTimeout(onResize, 250));

// ── Settings ──
$setBtn.addEventListener('click', e => {
  e.stopPropagation();
  settingsOpen = !settingsOpen;
  $setPanel.classList.toggle('show', settingsOpen);
});

let setBtnT=null;
function flashSettings() {
  $setBtn.classList.add('visible');
  clearTimeout(setBtnT);
  setBtnT = setTimeout(() => { if (!settingsOpen) $setBtn.classList.remove('visible'); }, 2500);
}
// Hide hint on user interaction, but don't reset the timer
function onUserInteraction() {
  if (hintVisible) { $hint.classList.remove('show'); hintVisible = false; }
}
document.addEventListener('mousemove', () => { flashSettings(); onUserInteraction(); });
document.addEventListener('touchstart', () => { flashSettings(); onUserInteraction(); }, {passive:true});

document.querySelectorAll('#bg-toggle button').forEach(b => {
  b.addEventListener('click', () => {
    bgColor = b.dataset.value;
    document.querySelectorAll('#bg-toggle button').forEach(x => x.classList.remove('active'));
    b.classList.add('active');
    applyTheme();
  });
});
document.querySelectorAll('#dir-toggle button').forEach(b => {
  b.addEventListener('click', () => {
    readDir = b.dataset.value;
    document.querySelectorAll('#dir-toggle button').forEach(x => x.classList.remove('active'));
    b.classList.add('active');
    pageCache.clear();
    updateHintPosition();
    display();
  });
});

document.addEventListener('click', e => {
  if (settingsOpen && !$setPanel.contains(e.target) && e.target !== $setBtn) {
    settingsOpen = false; $setPanel.classList.remove('show');
  }
});

// ── Init ──
function initSettingsUI() {
  document.querySelectorAll('#bg-toggle button').forEach(b =>
    b.classList.toggle('active', b.dataset.value === bgColor));
  document.querySelectorAll('#dir-toggle button').forEach(b =>
    b.classList.toggle('active', b.dataset.value === readDir));
}

async function init() {
  applyTheme(); initSettingsUI(); updateHintPosition();

  try {
    let frontImg = null, backImg = null;
    const covers = [];
    if (CONFIG.frontCover) covers.push(loadImage(CONFIG.frontCover).then(i=>{frontImg=i}).catch(()=>{}));
    if (CONFIG.backCover) covers.push(loadImage(CONFIG.backCover).then(i=>{backImg=i}).catch(()=>{}));

    const [pdf] = await Promise.all([
      pdfjsLib.getDocument(CONFIG.pdfPath).promise,
      ...covers
    ]);
    pdfDoc = pdf;

    buildVirtualPages(frontImg, backImg);
    isSpread = detectSpread();
    buildSpreads();
    currentIdx = 0;
    restoreBookmark();

    $loading.classList.add('hidden');
    $viewer.classList.add('visible');
    await display();
  } catch (err) {
    console.error(err);
    $loading.classList.add('hidden');
    $errMsg.textContent =
      'PDFの読み込みに失敗しました。\n' +
      'HTMLと同じディレクトリにファイルが配置されているか確認してください。\n\n' +
      '詳細: ' + err.message;
    $error.classList.add('show');
  }
}

init();
</script>
</body>
